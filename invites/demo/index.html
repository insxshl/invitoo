<!DOCTYPE html>
<html>
<head>
  <title>Babita ❤️ Jetha Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      overflow-x: hidden;
      background: linear-gradient(135deg, #050505, #0a0a0a, #120018, #000000);
      color: white;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,215,0,0.08), transparent 60%),
        radial-gradient(circle at bottom, rgba(255,0,150,0.08), transparent 60%);
      z-index: -1;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: 3.2rem;
      letter-spacing: 1px;
      text-shadow: 0 0 25px gold;
    }

    .typing {
      margin-top: 10px;
      color: #ffccff;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* BOX */
    .box {
      margin: 80px auto;
      width: 90%;
      max-width: 600px;
      background: rgba(255,255,255,0.06);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(255,215,0,0.15);
      transition: 0.3s;
    }

    .box:hover {
      transform: scale(1.03);
      box-shadow: 0 0 40px gold;
    }

    .box h3 {
      font-family: "Playfair Display", serif;
      font-weight: 600;
    }

    .box p {
      font-weight: 300;
      opacity: 0.9;
      margin-top: 5px;
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin: 10px;
      transition: 0.3s;
    }

    img:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px gold;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 500;
    }

    /* MUSIC */
    #musicBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 18px;
      border-radius: 50px;
      border: none;
      background: black;
      color: gold;
      cursor: pointer;
      z-index: 10;
      font-weight: 500;
    }

    /* HEARTS */
    .heart {
      position: fixed;
      color: pink;
      font-size: 18px;
      animation: floatUp 5s linear infinite;
      z-index: 0;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1 id="title"></h1>
  <div class="typing" id="typing"></div>
</div>

<!-- CARD 1 -->
<div class="box reveal">
  <img src="data:image/webp;base64,PASTE_YOUR_IMAGE_HERE">
  <img src="https://th.bing.com/th/id/OIP.8EGgdJJlWOisZqsmPKItcAHaEl?w=242&h=180&c=7&r=0&o=7&pid=1.7">

  <h3>📅 Wedding Details</h3>
  <p>Date: 1 April 2026</p>
  <p>Location: Gokuldham Society</p>

  <a class="btn" href="#">📍 View Location</a>
</div>

<!-- CARD 2 -->
<div class="box reveal">
  <h3>🎉 Events Timeline</h3>
  <p>Haldi 🟡 - 30 March</p>
  <p>Mehndi 🌿 - 31 March</p>
  <p>Wedding 💍 - 1 April</p>
</div>

<!-- MUSIC -->
<audio id="bgmusic">
  <source src="Heriya.mp3" type="audio/mp3">
</audio>

<button id="musicBtn">▶ Play</button>

<script>
/* TYPEWRITER */
let text = "Babita ❤️ Jetha Wedding Invitation";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("title").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 80);
  } else {
    document.getElementById("typing").innerHTML =
      "A cinematic wedding experience begins...";
  }
}
type();

/* GSAP ANIMATION */
gsap.from(".hero h1", { opacity: 0, y: -50, duration: 1.5 });

gsap.utils.toArray(".reveal").forEach(el => {
  gsap.from(el, {
    scrollTrigger: el,
    opacity: 0,
    y: 80,
    duration: 1
  });
});

/* HEARTS */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 300);

/* MUSIC CONTROL */
let music = document.getElementById("bgmusic");
let btn = document.getElementById("musicBtn");
let playing = false;

function fade(target) {
  let vol = music.volume;
  let t = setInterval(() => {
    if (target > vol) vol += 0.05;
    else vol -= 0.05;

    music.volume = vol;

    if (vol <= 0 || vol >= 1) clearInterval(t);
  }, 100);
}

btn.onclick = () => {
  if (!playing) {
    music.volume = 0;
    music.play();
    fade(1);
    btn.innerText = "⏹ Stop";
  } else {
    fade(0);
    setTimeout(() => music.pause(), 800);
    btn.innerText = "▶ Play";
  }
  playing = !playing;
};
</script>

</body>
</html>
